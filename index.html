<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image Carousel</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="carousel-wrapper">

    <div class="carousel-container">

        <button class="nav-btn prev">&#10094;</button>

        <div class="carousel-view">
            <div class="carousel-track">

                <img src="images/1.png" class="slide">
                <img src="images/2.png" class="slide">
                <img src="images/3.png" class="slide">
                <img src="images/4.png" class="slide">
                <img src="images/5.png" class="slide">
                <img src="images/6.png" class="slide">
                <img src="images/7.png" class="slide">
                <img src="images/8.png" class="slide">
                <img src="images/9.png" class="slide">
                <img src="images/10.png" class="slide">
                <img src="images/11.png" class="slide">
                <img src="images/12.png" class="slide">
                <img src="images/13.png" class="slide">
                <img src="images/14.png" class="slide">
                <img src="images/15.png" class="slide">
                <img src="images/16.png" class="slide">
                <img src="images/17.png" class="slide">
                <img src="images/18.png" class="slide">

            </div>
        </div>

        <button class="nav-btn next">&#10095;</button>

    </div>

    <div class="controls">
        <div class="dots"></div>


    </div>

</div>

<script src="script.js"></script>

    <!-- Fullscreen Viewer -->
<div class="fullscreen" id="fullscreen">
    <button class="fullscreen-close">&times;</button>

    <button class="fullscreen-nav fullscreen-prev">
        &#10094;
    </button>

    <img class="fullscreen-image" id="fullscreenImage">

    <button class="fullscreen-nav fullscreen-next">
        &#10095;
    </button>
</div>
    
</body>
</html>
